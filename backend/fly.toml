app = "neuroriskx-api"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  # SQLite lives on the mounted volume so accounts and history survive restarts.
  DATABASE_URL = "sqlite:////data/neuroriskx.db"

[[mounts]]
  source = "neuroriskx_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  # Keep one machine warm so a portfolio visitor never hits a cold start.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.http_options.response]
    pristine = true

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"

[checks.health]
  type = "http"
  port = 8000
  path = "/health"
  interval = "30s"
  timeout = "5s"
  grace_period = "30s"
