# Render blueprint. Connect this repo in the Render dashboard and it provisions
# the API and its database from this file.
services:
  - type: web
    name: neuroriskx-api
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      # Generated by Render and kept secret. Without it, tokens would be invalidated
      # on every restart.
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: neuroriskx-db
          property: connectionString
      # Set this to the deployed frontend origin once Vercel gives us the URL.
      - key: ALLOWED_ORIGINS
        sync: false

databases:
  - name: neuroriskx-db
    plan: free
    databaseName: neuroriskx
